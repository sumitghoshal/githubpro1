name: Java CI/CD Pipeline to Tomcat

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout source code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # Verify Maven
      - name: Verify Maven
        run: mvn -version

      # Build project
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # SonarQube Scan
      - name: SonarQube Analysis
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
          -Dsonar.projectKey=hotstar \
          -Dsonar.host.url=$SONAR_HOST_URL \
          -Dsonar.token=$SONAR_TOKEN

      # Upload artifact
      - name: Upload WAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: myapp
          path: target/*.war

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      # Download artifact
      - name: Download WAR artifact
        uses: actions/download-artifact@v4
        with:
          name: myapp
          path: deploy

      # Verify downloaded file
      - name: Check WAR file
        run: ls -la deploy/

      # Deploy to Tomcat
      - name: Deploy to Tomcat
        run: |
          WAR_FILE=$(find deploy -name "*.war")

          echo "Deploying: $WAR_FILE"

          curl -v -u "${{ secrets.TOMCAT_USER }}:${{ secrets.TOMCAT_PASSWORD }}" \
          --upload-file "$WAR_FILE" \
          "http://${{ secrets.TOMCAT_HOST }}/manager/text/deploy?path=/myapp&update=true"

      # Verify deployment
      - name: Verify deployment
        run: |
          sleep 20
          curl -I http://${{ secrets.TOMCAT_HOST }}/myapp
